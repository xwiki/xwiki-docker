import org.apache.tools.ant.filters.ReplaceTokens

// Run this Gradle build with 'gradle' to generate the various versions and variants from the template directory.
// Whenever a new version of XWiki is out, update this file to update the token values, run gradle and commit the
// result.
//
// Note: As a consequence only update the template files and never the generated files!

defaultTasks 'generate'

def variants = ['mysql-tomcat', 'mariadb-tomcat', 'postgres-tomcat']

// Notes:
// - The XWiki version + sha256, the per-cycle JDBC driver versions + sha256, and the LibreOffice
//   version + sha256 are all resolved and rewritten automatically by the 'updateXWiki', 'updateJDBC'
//   and 'updateLibreOffice' tasks below (chained by the 'release' umbrella). You normally never edit
//   these values by hand.
// - For reference, the artifacts the sha256 are computed from: the XWiki WAR from nexus.xwiki.org
//   (org/xwiki/platform/xwiki-platform-distribution-war) and the JDBC driver JARs from Maven Central
//   (com.mysql:mysql-connector-j, org.mariadb.jdbc:mariadb-java-client, org.postgresql:postgresql). To
//   compute a sha256 by hand: download the artifact then 'sha256sum <file>' (Unix) /
//   'shasum --algorithm 256 <file>' (Mac).
// - The JDBC driver versions are the ones declared in each cycle's own xwiki-platform POM properties
//   (mysql.version, mariadb.version, pgsql.version), i.e. the versions XWiki was tested against.
// - LibreOffice: XWiki officially supports a single version, the LTS one (aka "Previous Release"), see
//   https://dev.xwiki.org/xwiki/bin/view/Community/SupportStrategy/LibreOfficeSupportStrategy/. It is the version XWiki
//   tests against (the 'libreoffice.version' POM property, resolved to the latest patch of the previous stable branch,
//   see https://download.documentfoundation.org/libreoffice/stable/). We pin it here so the image is not at the mercy
//   of whatever the base image's Debian release ships. Rather than computing the version and the two sha256 (one per
//   CPU architecture, since the official image is built for both amd64 and arm64) by hand, run
//   './gradlew updateLibreOffice': it resolves the current LTS version the same way XWiki does and rewrites the pinned
//   values in this file (the .sha256 are read from the files the Document Foundation publishes next to the archives).

// The JDBC driver versions and their sha256 are no longer shared across cycles: each XWiki cycle uses
// the exact JDBC driver versions declared in that cycle's own xwiki-platform pom (the versions XWiki
// was tested against), so they are stored per cycle in the 'tokens' map below and updated
// automatically by the 'updateJDBC' task ('./gradlew updateJDBC').

