// The set of DB variants and their short names used in the official Docker library file. The first
// entry is the default variant (the one that also gets the version-only and role-global tags).
def dbVariants = [
    'mysql-tomcat': 'mysql',
    'postgres-tomcat': 'postgres',
    'mariadb-tomcat': 'mariadb'
]

task generate() {
    doLast {
        // Copy the template for all versions and variants
        tokens.keySet().each() { version ->
            variants.each() { variant ->
                // Extract the db type and add it as a token
                def (db, servlet) = variant.tokenize('-')
                tokens[version].'db' = db
                // Add the LibreOffice tokens (shared by all cycles, see above)
                tokens[version].'libreofficeVersion' = libreofficeVersion
                tokens[version].'libreofficeSha256Amd64' = libreofficeSha256Amd64
                tokens[version].'libreofficeSha256Arm64' = libreofficeSha256Arm64
                // Copy common template files, evaluating groovy in them
                copy {
                    from 'template'
                    into "${version}/${variant}"
                    include '.env'
                    include 'Dockerfile'
                    include 'docker-compose.yml'
                    include 'xwiki/*'
                    expand(tokens[version])
                    filteringCharset = 'UTF-8'
                }
                // Copy DB-specific template files, evaluating groovy in them
                copy {
                    from 'template'
                    into "${version}/${variant}"
                    include "${db}/*"
                    expand(tokens[version])
                    filteringCharset = 'UTF-8'
                }
                // Copy Servlet-specific template files, evaluating groovy in them
                copy {
                    from 'template'
                    into "${version}/${variant}"
                    include "${servlet}/*"
                    expand(tokens[version])
                    filteringCharset = 'UTF-8'
                }
            }
        }
    }
}

// Fetch a URL as text, following redirects manually. The Document Foundation download URLs answer with a 302 to a
// mirror (sometimes switching from https to http), which the default HttpURLConnection redirect handling refuses to
// follow, so we follow them ourselves.
def httpGetText
httpGetText = { String location ->
    def current = location
    for (int hop = 0; hop < 5; hop++) {
        def connection = (HttpURLConnection) new URL(current).openConnection()
        connection.instanceFollowRedirects = false
        connection.connectTimeout = 30000
        connection.readTimeout = 30000
        def status = connection.responseCode
        if (status in [301, 302, 303, 307, 308]) {
            current = connection.getHeaderField('Location')
            connection.disconnect()
        } else if (status == 200) {
            return connection.inputStream.getText('UTF-8')
        } else {
            throw new GradleException("Unexpected HTTP status [$status] while fetching [$current]")
        }
    }
    throw new GradleException("Too many redirects while fetching [$location]")
}

// Resolve the LibreOffice version to pin (the LTS one, i.e. the latest patch of the previous stable branch) and its
// per-architecture sha256 from the Document Foundation, then rewrite the pinned 'libreoffice*' values at the top of
// this file. This mirrors how XWiki resolves 'libreoffice.version=lts' at test time (see LibreOfficeResolver in
// xwiki-platform-test-docker) but bakes a concrete, sha256-verified value into build.gradle so that image generation
// stays reproducible and offline. Run it during the Docker release (step "Update Docker" of
// https://dev.xwiki.org/xwiki/bin/view/ReleasePlans/ReleasePlanHelp), then run './gradlew' to regenerate the images.
task updateLibreOffice() {
    doLast {
        def stableUrl = 'https://download.documentfoundation.org/libreoffice/stable/'
        def listing = httpGetText(stableUrl)

        // Parse the version directories (e.g. "25.8.7/") into major/minor/patch.
        def versions = []
        (listing =~ /href="(\d+)\.(\d+)\.(\d+)\/"/).each { full, major, minor, patch ->
            versions << [major: major as int, minor: minor as int, patch: patch as int]
        }
        if (versions.isEmpty()) {
            throw new GradleException("Failed to find any LibreOffice version at [$stableUrl]")
        }

        // Group into distinct branches (major.minor) sorted ascending; the LTS is the previous branch (second to last).
        def branches = versions.collect { [it.major, it.minor] }.unique(false).sort { a, b ->
            (a[0] <=> b[0]) ?: (a[1] <=> b[1])
        }
        if (branches.size() < 2) {
            throw new GradleException("Expected at least 2 LibreOffice branches at [$stableUrl] to determine the LTS")
        }
        def ltsBranch = branches[branches.size() - 2]

        // Keep the latest patch of the LTS branch.
        def lts = versions.findAll { it.major == ltsBranch[0] && it.minor == ltsBranch[1] }.max { it.patch }
        def newVersion = "${lts.major}.${lts.minor}.${lts.patch}"

        // Read the sha256 the Document Foundation publishes next to each archive (format: "<sha256>  <filename>").
        def resolveSha256 = { String archDir, String archFile ->
            def url = "${stableUrl}${newVersion}/deb/${archDir}/" +
                "LibreOffice_${newVersion}_Linux_${archFile}_deb.tar.gz.sha256"
            return httpGetText(url).trim().split(/\s+/)[0]
        }
        def newSha256Amd64 = resolveSha256('x86_64', 'x86-64')
        def newSha256Arm64 = resolveSha256('aarch64', 'aarch64')

        // Rewrite the pinned values in this build.gradle.
        def buildFile = file('build.gradle')
        def content = buildFile.text
        content = content
            .replaceFirst(/def libreofficeVersion = '[^']*'/, "def libreofficeVersion = '${newVersion}'")
            .replaceFirst(/def libreofficeSha256Amd64 = '[^']*'/, "def libreofficeSha256Amd64 = '${newSha256Amd64}'")
            .replaceFirst(/def libreofficeSha256Arm64 = '[^']*'/, "def libreofficeSha256Arm64 = '${newSha256Arm64}'")
        buildFile.text = content

        if (newVersion == libreofficeVersion) {
            logger.lifecycle("LibreOffice is already up to date (${newVersion}).")
        } else {
            logger.lifecycle("Updated LibreOffice from ${libreofficeVersion} to ${newVersion}.")
        }
        // Also update the in-memory values so that a 'generate' chained in the same invocation (e.g.
        // via the 'release' umbrella) picks up the new LibreOffice version.
        libreofficeVersion = newVersion
        libreofficeSha256Amd64 = newSha256Amd64
        libreofficeSha256Arm64 = newSha256Arm64
        logger.lifecycle("Run './gradlew' to regenerate the images with the pinned LibreOffice version.")
    }
}

// Compare two dot-separated numeric versions (e.g. '18.10.2' <=> '18.9.5'), component by component.
def compareVersions = { String a, String b ->
    def pa = a.tokenize('.').collect { it as int }
    def pb = b.tokenize('.').collect { it as int }
    def n = Math.max(pa.size(), pb.size())
    for (int i = 0; i < n; i++) {
        def x = i < pa.size() ? pa[i] : 0
        def y = i < pb.size() ? pb[i] : 0
        if (x != y) {
            return x <=> y
        }
    }
    return 0
}

// Stream a URL (following redirects like httpGetText) through a SHA-256 digest without buffering the
// whole payload in memory, and return the lowercase hex digest. Used to hash the (large) XWiki WAR and
// the JDBC driver JARs.
def sha256OfUrl
sha256OfUrl = { String location ->
    def current = location
    for (int hop = 0; hop < 5; hop++) {
        def connection = (HttpURLConnection) new URL(current).openConnection()
        connection.instanceFollowRedirects = false
        connection.connectTimeout = 30000
        connection.readTimeout = 60000
        def status = connection.responseCode
        if (status in [301, 302, 303, 307, 308]) {
            current = connection.getHeaderField('Location')
            connection.disconnect()
        } else if (status == 200) {
            def digest = java.security.MessageDigest.getInstance('SHA-256')
            connection.inputStream.withStream { input ->
                byte[] buffer = new byte[65536]
                int read
                while ((read = input.read(buffer)) != -1) {
                    digest.update(buffer, 0, read)
                }
            }
            return digest.digest().collect { String.format('%02x', it & 0xff) }.join('')
        } else {
            throw new GradleException("Unexpected HTTP status [$status] while fetching [$current]")
        }
    }
    throw new GradleException("Too many redirects while fetching [$location]")
}

// Rewrite one or more "field: 'value'" entries inside a single cycle's block of the 'tokens' map in
// build.gradle, without touching the same field name in other cycles. Works line by line so nested
// maps (tomcatImageTag) and unrelated fields (role, libraryComment) are left untouched.
def rewriteCycleFields
rewriteCycleFields = { String content, String cycle, Map fieldValues ->
    def currentCycle = null
    def out = content.readLines().collect { line ->
        if (line ==~ /^\S.*/) {
            // A non-indented line means we left the 'tokens' map region.
            currentCycle = null
        }
        def cycleMatcher = (line =~ /^\s{4}'([^']+)':\s*\[\s*$/)
        if (cycleMatcher.matches()) {
            currentCycle = cycleMatcher.group(1)
            return line
        }
        if (currentCycle == cycle) {
            def fieldMatcher = (line =~ /^(\s*)(\w+):\s*'[^']*'(,?)\s*$/)
            if (fieldMatcher.matches()) {
                def indent = fieldMatcher.group(1)
                def name = fieldMatcher.group(2)
                def comma = fieldMatcher.group(3)
                if (fieldValues.containsKey(name)) {
                    return "${indent}${name}: '${fieldValues[name]}'${comma}"
                }
            }
        }
        return line
    }
    return out.join('\n') + '\n'
}

// Run an external command (optionally in workingDir), capturing its stdout; throw on a non-zero exit
// unless allowFailure is set. Returns the trimmed stdout. Used by 'smokeTest' (docker compose) and
// 'submitOfficialImage' (git/gh plumbing). Uses Groovy's Process API rather than Gradle's exec (removed
// from the Project API in Gradle 9) so it works regardless of the Gradle version.
def capture
capture = { List<String> command, boolean allowFailure = false, File workingDir = null ->
    def stdout = new StringWriter()
    def stderr = new StringWriter()
    def process = workingDir ? command.execute(null, workingDir) : command.execute()
    process.consumeProcessOutput(stdout, stderr)
    process.waitFor()
    if (!allowFailure && process.exitValue() != 0) {
        throw new GradleException("Command [${command.join(' ')}] failed (exit ${process.exitValue()}):\n" +
            "${stdout.toString().trim()}\n${stderr.toString().trim()}")
    }
    return stdout.toString().trim()
}

// Resolve, for each existing cycle, the latest final XWiki version on that cycle's line (18 -> latest
// 18.x, 18.4 -> latest 18.4.x, ...) from XWiki's Maven metadata, and for any cycle whose version
// changed, download the WAR, compute its sha256, and rewrite the pinned values in this build.gradle.
// Does NOT create new cycles. Run './gradlew' afterwards to regenerate the images (or use the
// 'release' umbrella which chains both).
task updateXWiki() {
    doLast {
        // Resolve versions from nexus.xwiki.org. The generated Dockerfile downloads the WAR from
        // maven.xwiki.org, which is just a view on nexus.xwiki.org (same artifacts), so the sha256 we
        // compute here is that of the exact bytes the image will fetch. The metadata lists RCs, hence
        // the finals-only filter below.
        def metadataUrl = 'https://nexus.xwiki.org/nexus/content/groups/public/' +
            'org/xwiki/platform/xwiki-platform-distribution-war/maven-metadata.xml'
        def metadata = httpGetText(metadataUrl)
        def finals = []
        (metadata =~ /<version>([^<]+)<\/version>/).each { full, v ->
            if (v ==~ /\d+\.\d+\.\d+/) {
                finals << v
            }
        }
        if (finals.isEmpty()) {
            throw new GradleException("No final XWiki versions found at [$metadataUrl]")
        }
        def buildFile = file('build.gradle')
        def content = buildFile.text
        def changed = []
        tokens.each { cycle, data ->
            def parts = cycle.tokenize('.')
            def matching = finals.findAll { fv ->
                def fparts = fv.tokenize('.')
                parts.size() <= fparts.size() && (0..<parts.size()).every { fparts[it] == parts[it] }
            }
            if (matching.isEmpty()) {
                logger.lifecycle("No final XWiki version found for cycle ${cycle}; skipping.")
                return
            }
            def latest = matching.max { a, b -> compareVersions(a, b) }
            if (latest == data.xwikiVersion) {
                logger.lifecycle("XWiki cycle ${cycle} is already up to date (${data.xwikiVersion}).")
                return
            }
            def warUrl = 'https://nexus.xwiki.org/nexus/content/groups/public/' +
                "org/xwiki/platform/xwiki-platform-distribution-war/${latest}/" +
                "xwiki-platform-distribution-war-${latest}.war"
            logger.lifecycle("Updating XWiki cycle ${cycle} from ${data.xwikiVersion} to ${latest} " +
                '(downloading the WAR to compute its sha256, this may take a while)...')
            def sha = sha256OfUrl(warUrl)
            content = rewriteCycleFields(content, cycle, [xwikiVersion: latest, xwikiSha256: sha])
            data.xwikiVersion = latest
            data.xwikiSha256 = sha
            changed << cycle
        }
        if (!changed.isEmpty()) {
            buildFile.text = content
            logger.lifecycle("Updated XWiki version for cycle(s): ${changed.join(', ')}.")
        }
        // Record changed cycles so a chained 'smokeTest' (in the 'release' umbrella) knows what to test.
        project.ext.changedXWikiCycles = changed
        logger.lifecycle("Run './gradlew' to regenerate the images.")
    }
}

// For each existing cycle, read the JDBC driver versions declared in that cycle's own xwiki-platform
// pom (the versions XWiki was tested against) and, for any that changed, download the driver JAR from
// Maven Central, compute its sha256, and rewrite the per-cycle values in this build.gradle. Run
// './gradlew' afterwards to regenerate the images.
task updateJDBC() {
    doLast {
        def drivers = [
            [name: 'mysql', prop: 'mysql.version', path: 'com/mysql/mysql-connector-j',
             jar: { v -> "mysql-connector-j-${v}.jar" },
             tokenV: 'mysqlJDBCVersion', tokenS: 'mysqlJDBCSha256'],
            [name: 'mariadb', prop: 'mariadb.version', path: 'org/mariadb/jdbc/mariadb-java-client',
             jar: { v -> "mariadb-java-client-${v}.jar" },
             tokenV: 'mariadbJDBCVersion', tokenS: 'mariadbJDBCSha256'],
            [name: 'postgres', prop: 'pgsql.version', path: 'org/postgresql/postgresql',
             jar: { v -> "postgresql-${v}.jar" },
             tokenV: 'postgresJDBCVersion', tokenS: 'postgresJDBCSha256']
        ]
        def buildFile = file('build.gradle')
        def content = buildFile.text
        tokens.each { cycle, data ->
            def version = data.xwikiVersion
            // Read the JDBC driver versions from the cycle's own xwiki-platform pom on nexus.xwiki.org.
            // The driver JARs themselves are hashed from Maven Central below, because that is where the
            // generated Dockerfile downloads them from (see template/Dockerfile).
            def pomUrl = 'https://nexus.xwiki.org/nexus/content/groups/public/' +
                "org/xwiki/platform/xwiki-platform/${version}/xwiki-platform-${version}.pom"
            def pom = httpGetText(pomUrl)
            def fieldValues = [:]
            drivers.each { d ->
                def matcher = (pom =~ /<${d.prop}>([^<]+)<\/${d.prop}>/)
                if (!matcher.find()) {
                    throw new GradleException("Could not find <${d.prop}> in [$pomUrl]")
                }
                def newVersion = matcher.group(1)
                if (newVersion == data[d.tokenV]) {
                    logger.lifecycle("Cycle ${cycle}: ${d.name} JDBC already up to date (${newVersion}).")
                    return
                }
                def jarUrl = "https://repo1.maven.org/maven2/${d.path}/${newVersion}/${d.jar(newVersion)}"
                logger.lifecycle("Cycle ${cycle}: ${d.name} JDBC ${data[d.tokenV]} -> ${newVersion} " +
                    '(hashing jar)...')
                def sha = sha256OfUrl(jarUrl)
                fieldValues[d.tokenV] = newVersion
                fieldValues[d.tokenS] = sha
                data[d.tokenV] = newVersion
                data[d.tokenS] = sha
            }
            if (!fieldValues.isEmpty()) {
                content = rewriteCycleFields(content, cycle, fieldValues)
            }
        }
        buildFile.text = content
        logger.lifecycle("Run './gradlew' to regenerate the images.")
    }
}

// Boot-check the postgres-tomcat variant of the given cycles: start it with docker compose, wait until
// XWiki serves HTTP 200 on http://localhost:8080, then tear it down. By default it tests the cycles
// whose XWiki version changed in this invocation (set by 'updateXWiki', used by the 'release'
// umbrella); pass '-Pcycles=18,17' to test specific cycles, or run it standalone to test them all.
task smokeTest() {
    doLast {
        def variant = 'postgres-tomcat'
        def cycles
        if (project.hasProperty('cycles')) {
            cycles = project.property('cycles').tokenize(',')*.trim().findAll { it }
        } else if (project.ext.has('changedXWikiCycles')) {
            cycles = project.ext.changedXWikiCycles
        } else {
            cycles = tokens.keySet() as List
        }
        if (cycles.isEmpty()) {
            logger.lifecycle('smokeTest: no cycles to test.')
            return
        }
        cycles.each { cycle ->
            def dir = file("${cycle}/${variant}")
            if (!dir.exists()) {
                throw new GradleException("smokeTest: directory [${dir}] does not exist.")
            }
            logger.lifecycle("smokeTest: starting XWiki ${cycle} (${variant})...")
            try {
                capture(['docker', 'compose', 'up', '-d'], false, dir)
                def deadline = System.currentTimeMillis() + 600000
                def ready = false
                while (System.currentTimeMillis() < deadline) {
                    def code = -1
                    try {
                        def conn = (HttpURLConnection) new URL('http://localhost:8080/').openConnection()
                        conn.connectTimeout = 5000
                        conn.readTimeout = 5000
                        code = conn.responseCode
                        conn.disconnect()
                    } catch (ignored) {
                        // XWiki not serving yet; keep polling.
                    }
                    if (code == 200) {
                        ready = true
                        break
                    }
                    Thread.sleep(5000)
                }
                if (!ready) {
                    throw new GradleException("smokeTest: XWiki ${cycle} (${variant}) did not serve " +
                        'HTTP 200 on http://localhost:8080 within the timeout.')
                }
                logger.lifecycle("smokeTest: XWiki ${cycle} (${variant}) is up (HTTP 200).")
            } finally {
                capture(['docker', 'compose', 'down', '-v'], true, dir)
            }
        }
    }
}

// Constants of the official Docker library file (https://github.com/docker-library/official-images).
// These match the header currently published for xwiki and rarely change.
def libraryMaintainers = 'XWiki Core Dev Team <committers@xwiki.org> (@xwiki)'
def libraryGitRepo = 'https://github.com/xwiki-contrib/docker-xwiki.git'
def libraryArchitectures = 'amd64, arm64v8'
def officialImagesRepo = 'docker-library/official-images'
def libraryPath = 'library/xwiki'

// Default section comment emitted before each cycle's first block, keyed by role. A cycle may override
// it with its own 'libraryComment' (e.g. cycle 16's "- Added back temporarily" annotation).
def librarySectionComments = [
    'stable': '# Latest stable',
    'intermediate-lts': '# Intermediate LTS',
    'lts': '# LTS',
    'previous': '# Previous LTS'
]

// The version tags a cycle contributes, from most to least generic. A major-only cycle key (e.g. '18',
// version 18.5.0) yields [18, 18.5, 18.5.0]; a major.minor key (e.g. '18.4', version 18.4.2) yields
// [18.4, 18.4.2] (no bare-major tag, since another cycle owns the major line).
def libraryVersionPrefixes = { String cycle, String version ->
    def v = version.tokenize('.')
    if (cycle.tokenize('.').size() == 1) {
        return [v[0], "${v[0]}.${v[1]}", version]
    }
    return ["${v[0]}.${v[1]}", version]
}

// The full ordered tag list for one cycle/variant, reproducing the upstream conventions: bare version
// tags only on the default variant; per-variant version tags on every variant; and role-driven aliases
// (bare variant + stable-/lts- + the global stable/latest/lts tags) added only for the stable and LTS
// cycles.
def libraryTags = { String variant, String db, boolean isDefault, String role, List prefixes ->
    def tags = []
    if (isDefault) {
        tags += prefixes
    }
    tags += prefixes.collect { "${it}-${variant}".toString() }
    if (role == 'stable') {
        tags += variant
        tags += ["stable-${variant}".toString(), "stable-${db}".toString()]
        if (isDefault) {
            tags += ['stable', 'latest']
        }
    } else if (role == 'lts') {
        tags += ["lts-${variant}".toString(), "lts-${db}".toString()]
        if (isDefault) {
            tags += 'lts'
        }
    }
    return tags
}

// The 'GitCommit' of a cycle = the last commit that touched that cycle's directory. docker-library
// fetches this exact commit from GitRepo to (re)build the images, so it only rebuilds cycles whose
// GitCommit changed.
def libraryGitCommit
libraryGitCommit = { String cycle ->
    return capture(['git', 'log', '-1', '--format=%H', '--', "${cycle}/".toString()])
}

// Generate the complete content of the official Docker library file from the 'tokens' model, using the
// algorithm above. Verified to reproduce the current upstream file byte for byte.
def defaultVariant = dbVariants.keySet().first()
def generateLibraryContent
generateLibraryContent = {
    def sb = new StringBuilder()
    sb << "Maintainers: ${libraryMaintainers}\n"
    sb << "GitRepo: ${libraryGitRepo}\n"
    tokens.each { cycle, data ->
        def prefixes = libraryVersionPrefixes(cycle, data.xwikiVersion)
        def commit = libraryGitCommit(cycle)
        def comment = data.libraryComment ?: librarySectionComments[data.role]
        sb << "\n${comment}\n"
        def first = true
        dbVariants.each { variant, db ->
            if (!first) {
                sb << '\n'
            }
            first = false
            def tags = libraryTags(variant, db, variant == defaultVariant, data.role, prefixes)
            sb << "Tags: ${tags.join(', ')}\n"
            sb << "Architectures: ${libraryArchitectures}\n"
            sb << "Directory: ${cycle}/${variant}\n"
            sb << "GitCommit: ${commit}\n"
        }
    }
    return sb.toString()
}

// Generate the official Docker library file for xwiki and open a pull request against
// docker-library/official-images, updating the single 'library/xwiki' file on a branch of your GitHub
// fork (no local clone). Run it AFTER './gradlew release' and after you have committed and pushed the
// docker-xwiki change, so that the emitted GitCommit(s) are reachable upstream. Pass '-PdryRun' to only
// generate the file and show the diff, without touching your fork or opening a PR. Uses
// 'env -u GH_TOKEN gh' because a GH_TOKEN in the environment cannot create PRs.
task submitOfficialImage() {
    doLast {
        // gh must be authenticated (needed for the upstream fetch below and the PR flow).
        capture(['env', '-u', 'GH_TOKEN', 'gh', 'auth', 'status'])

        // Generate the library file and write it out for review.
        def content = generateLibraryContent()
        def outFile = file('build/library-xwiki')
        outFile.parentFile.mkdirs()
        outFile.text = content

        // Fetch the current upstream file and show a real diff against the generated one.
        def upstreamB64 = capture(['env', '-u', 'GH_TOKEN', 'gh', 'api',
            "repos/${officialImagesRepo}/contents/${libraryPath}", '--jq', '.content'])
        def upstreamContent = new String(upstreamB64.replaceAll('\\s', '').decodeBase64(), 'UTF-8')
        if (content == upstreamContent) {
            logger.lifecycle('The generated library file is identical to the upstream one; nothing to submit.')
            return
        }
        def upstreamFile = file('build/library-xwiki.upstream')
        upstreamFile.text = upstreamContent
        def diff = capture(['git', '--no-pager', 'diff', '--no-index', '--',
            upstreamFile.path, outFile.path], true)
        logger.lifecycle("Generated ${libraryPath} (diff upstream -> generated):\n${diff}")

        if (project.hasProperty('dryRun')) {
            logger.lifecycle("dryRun set: wrote ${outFile}; skipping the guards, fork and PR steps.")
            return
        }

        // The working tree must be clean and HEAD must be pushed: the GitCommit values we emit are the
        // last commits that touched each cycle directory, and docker-library fetches those exact commits
        // from GitRepo, so anything uncommitted or unpushed would not be reachable upstream.
        if (!capture(['git', 'status', '--porcelain']).isEmpty()) {
            throw new GradleException('The working tree is dirty. Commit and push the docker-xwiki ' +
                'change before running submitOfficialImage.')
        }
        def head = capture(['git', 'rev-parse', 'HEAD'])
        if (capture(['git', 'branch', '-r', '--contains', head]).isEmpty()) {
            throw new GradleException("HEAD (${head}) is not pushed to any remote. Push the docker-xwiki " +
                'change before running submitOfficialImage.')
        }

        // Resolve the GitHub user and the upstream default branch.
        def login = capture(['env', '-u', 'GH_TOKEN', 'gh', 'api', 'user', '--jq', '.login'])
        def fork = "${login}/official-images"
        def defaultBranch = capture(['env', '-u', 'GH_TOKEN', 'gh', 'api',
            "repos/${officialImagesRepo}", '--jq', '.default_branch'])

        // Ensure the fork exists (idempotent) and sync its default branch to upstream.
        capture(['env', '-u', 'GH_TOKEN', 'gh', 'repo', 'fork', officialImagesRepo, '--clone=false'])
        capture(['env', '-u', 'GH_TOKEN', 'gh', 'repo', 'sync', fork, '--source', officialImagesRepo,
            '--branch', defaultBranch])

        // Create a working branch on the fork off the freshly synced default branch (recreating it if a
        // previous run left one behind).
        def stableVersion = tokens.find { cycle, data -> data.role == 'stable' }.value.xwikiVersion
        def branch = "update-xwiki-${stableVersion}"
        def baseSha = capture(['env', '-u', 'GH_TOKEN', 'gh', 'api',
            "repos/${fork}/git/ref/heads/${defaultBranch}", '--jq', '.object.sha'])
        capture(['env', '-u', 'GH_TOKEN', 'gh', 'api', '-X', 'DELETE',
            "repos/${fork}/git/refs/heads/${branch}"], true)
        capture(['env', '-u', 'GH_TOKEN', 'gh', 'api', '-X', 'POST', "repos/${fork}/git/refs",
            '-f', "ref=refs/heads/${branch}", '-f', "sha=${baseSha}"])

        // Update the single file on that branch via the contents API (needs the current blob sha).
        def fileSha = capture(['env', '-u', 'GH_TOKEN', 'gh', 'api',
            "repos/${fork}/contents/${libraryPath}?ref=${branch}", '--jq', '.sha'])
        def commitMessage = "Update XWiki to ${stableVersion}"
        capture(['env', '-u', 'GH_TOKEN', 'gh', 'api', '-X', 'PUT',
            "repos/${fork}/contents/${libraryPath}",
            '-f', "message=${commitMessage}",
            '-f', "content=${content.bytes.encodeBase64().toString()}",
            '-f', "sha=${fileSha}",
            '-f', "branch=${branch}"])

        // Open the PR against upstream.
        def roleLabels = ['stable': 'stable', 'intermediate-lts': 'intermediate LTS', 'lts': 'LTS',
            'previous': 'previous LTS']
        def prBody = 'Update the XWiki official images to the latest releases:\n\n' +
            tokens.collect { cycle, data -> "- `${cycle}` (${roleLabels[data.role]}): ${data.xwikiVersion}" }
                .join('\n') + '\n'
        def prUrl = capture(['env', '-u', 'GH_TOKEN', 'gh', 'pr', 'create', '--repo', officialImagesRepo,
            '--base', defaultBranch, '--head', "${login}:${branch}",
            '--title', commitMessage, '--body', prBody])
        logger.lifecycle("Opened official-images PR: ${prUrl}")
    }
}

// Pre-push release umbrella: refresh XWiki + JDBC + LibreOffice versions, regenerate all images, then
// smoke-test the cycles that changed. After this, review/commit/push docker-xwiki, then run
// './gradlew submitOfficialImage' to open the official Docker library PR.
task release() {
    dependsOn 'updateXWiki', 'updateJDBC', 'updateLibreOffice', 'generate', 'smokeTest'
}

// Ordering so that a single 'release' invocation composes correctly: version updates first (JDBC after
// XWiki, since it reads each cycle's - possibly just-bumped - version), then generation, then smoke
// tests. The update tasks mutate the in-memory token model too, so the chained 'generate' sees the
// fresh values.
tasks.named('updateJDBC').configure { mustRunAfter('updateXWiki') }
tasks.named('updateLibreOffice').configure { mustRunAfter('updateXWiki', 'updateJDBC') }
tasks.named('generate').configure {
    mustRunAfter('updateXWiki', 'updateJDBC', 'updateLibreOffice')
}
tasks.named('smokeTest').configure { mustRunAfter('generate') }
